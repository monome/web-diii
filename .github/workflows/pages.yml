name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish main site to gh-pages root
        run: |
          set -euo pipefail

          PUBLISH_BRANCH="gh-pages"
          TMP_DIR="$(mktemp -d)"

          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='README.md' \
            --exclude='LICENSE' \
            --exclude='TODO' \
            ./ "$TMP_DIR/site/"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "$PUBLISH_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$PUBLISH_BRANCH"
            git checkout -B "$PUBLISH_BRANCH" "origin/$PUBLISH_BRANCH"
          else
            git checkout --orphan "$PUBLISH_BRANCH"
            git rm -rf . >/dev/null 2>&1 || true
          fi

          find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name 'preview' -exec rm -rf {} +
          rsync -a --delete "$TMP_DIR/site/" ./

          if [[ -n "$(git status --porcelain)" ]]; then
            git add -A
            git commit -m "Deploy main site (${GITHUB_SHA::7})"
            git push origin "$PUBLISH_BRANCH"
          else
            echo "No production site changes to publish."
          fi
