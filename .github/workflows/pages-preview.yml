name: Deploy PR Preview

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pages-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)
    runs-on: ubuntu-latest
    environment:
      name: github-pages-preview
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy preview to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          preview: true

      - name: Publish preview URL to workflow summary
        run: |
          echo "### PR Preview URL" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=PR Preview URL::${{ steps.deployment.outputs.page_url }}"

      - name: Comment preview URL on PR
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const marker = '<!-- pages-preview-url -->';
              const previewUrl = '${{ steps.deployment.outputs.page_url }}';
              const body = `${marker}
              Preview deployed for this PR:

              ${previewUrl}

              _This comment is updated automatically on new commits._`;

              const { owner, repo } = context.repo;
              const issue_number = context.payload.pull_request.number;

              const { data: comments } = await github.rest.issues.listComments({
                owner,
                repo,
                issue_number,
                per_page: 100,
              });

              const existing = comments.find(
                (comment) =>
                  comment.user?.login === 'github-actions[bot]' &&
                  comment.body?.includes(marker)
              );

              if (existing) {
                try {
                  await github.rest.issues.updateComment({
                    owner,
                    repo,
                    comment_id: existing.id,
                    body,
                  });
                } catch (updateError) {
                  if (updateError.status === 403) {
                    await github.rest.issues.createComment({
                      owner,
                      repo,
                      issue_number,
                      body,
                    });
                  } else {
                    throw updateError;
                  }
                }
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body,
                });
              }
            } catch (error) {
              if (error.status === 403) {
                const accepted = error.response?.headers?.['x-accepted-github-permissions'] || 'unknown';
                core.warning(`Skipping PR comment: ${error.message}. Accepted token permissions for this request: ${accepted}`);
              } else {
                throw error;
              }
            }
