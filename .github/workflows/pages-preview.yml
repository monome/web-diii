name: Deploy PR Preview

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - closed

permissions:
  contents: write
  issues: write

concurrency:
  group: pages-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      PREVIEW_PATH: previews/pr-${{ github.event.pull_request.number }}
      PREVIEW_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/previews/pr-${{ github.event.pull_request.number }}/

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish PR preview path to gh-pages
        run: |
          set -euo pipefail

          PUBLISH_BRANCH="gh-pages"
          TMP_DIR="$(mktemp -d)"

          if [[ "${{ github.event.action }}" != "closed" ]]; then
            rsync -a \
              --exclude='.git' \
              --exclude='.github' \
              --exclude='README.md' \
              --exclude='LICENSE' \
              --exclude='TODO' \
              ./ "$TMP_DIR/site/"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "$PUBLISH_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$PUBLISH_BRANCH"
            git checkout -B "$PUBLISH_BRANCH" "origin/$PUBLISH_BRANCH"
          else
            git checkout --orphan "$PUBLISH_BRANCH"
            git rm -rf . >/dev/null 2>&1 || true
          fi

          mkdir -p "$(dirname "$PREVIEW_PATH")"

          if [[ "${{ github.event.action }}" == "closed" ]]; then
            rm -rf "$PREVIEW_PATH"
          else
            mkdir -p "$PREVIEW_PATH"
            rsync -a --delete "$TMP_DIR/site/" "$PREVIEW_PATH/"
          fi

          if [[ -n "$(git status --porcelain)" ]]; then
            git add -A
            if [[ "${{ github.event.action }}" == "closed" ]]; then
              git commit -m "Remove PR preview #${{ github.event.pull_request.number }}"
            else
              git commit -m "Update PR preview #${{ github.event.pull_request.number }} (${GITHUB_SHA::7})"
            fi
            git push origin "$PUBLISH_BRANCH"
          else
            echo "No preview changes to publish."
          fi

      - name: Comment preview URL on PR
        if: ${{ github.event.action != 'closed' }}
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const marker = '<!-- pages-preview-url -->';
              const body = `${marker}
              Preview deployed for this PR:

              ${process.env.PREVIEW_URL}

              _This comment is updated automatically on new commits._`;

              const { owner, repo } = context.repo;
              const issue_number = context.payload.pull_request.number;

              const { data: comments } = await github.rest.issues.listComments({
                owner,
                repo,
                issue_number,
                per_page: 100,
              });

              const existing = comments.find(
                (comment) =>
                  comment.user?.type === 'Bot' &&
                  comment.body?.includes(marker)
              );

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body,
                });
              }
            } catch (error) {
              if (error.status === 403) {
                core.warning('Skipping PR comment: GITHUB_TOKEN does not have write permission for issue comments in this run.');
              } else {
                throw error;
              }
            }
